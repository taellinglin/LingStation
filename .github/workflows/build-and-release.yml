name: Release Binaries

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Linux audio deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig" >> $GITHUB_ENV
          pkg-config --libs --cflags alsa

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Resolve version
        shell: bash
        run: |
          VERSION=$(python - <<'PY'
          import re
          from pathlib import Path

          text = Path('Cargo.toml').read_text(encoding='utf-8')
          in_workspace = False
          version = None
          for line in text.splitlines():
            if line.strip() == '[workspace.package]':
              in_workspace = True
              continue
            if in_workspace and line.strip().startswith('['):
              break
            if in_workspace:
              match = re.match(r'version\s*=\s*"([^"]+)"', line.strip())
              if match:
                version = match.group(1)
                break
          if not version:
            raise SystemExit('version not found in [workspace.package]')
          print(version)
          PY
          )
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build (release)
        run: cargo build -p lingstation-app --release

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          BIN_NAME=lingstation-app
          if [ "$RUNNER_OS" = "macOS" ]; then
            EXT=macOS
          else
            EXT=Linux
          fi
          cp "target/release/${BIN_NAME}" "dist/LingStation-v${VERSION}-${EXT}"
          cp "font.otf" "dist/"
          cp "font.ttf" "dist/"
          cp "icon.png" "dist/"
          cp "startup.wav" "dist/"
          tar -czf "dist/LingStation-v${VERSION}-${EXT}.tar.gz" -C dist \
            "LingStation-v${VERSION}-${EXT}" \
            "font.otf" \
            "font.ttf" \
            "icon.png" \
            "startup.wav"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $binName = "lingstation-app.exe"
          $dest = "dist\LingStation-v$env:VERSION-Windows.exe"
          Copy-Item -Path "target\release\$binName" -Destination $dest
          Copy-Item -Path "font.otf" -Destination "dist\font.otf"
          Copy-Item -Path "font.ttf" -Destination "dist\font.ttf"
          Copy-Item -Path "icon.png" -Destination "dist\icon.png"
          Copy-Item -Path "startup.wav" -Destination "dist\startup.wav"
          Compress-Archive -Path "dist\*" -DestinationPath "dist\LingStation-v$env:VERSION-Windows.zip" -Force

      - name: Delete existing release assets
        run: echo "release handled in separate job"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ runner.os }}
          path: dist/*

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        run: |
          VERSION=$(python - <<'PY'
          import re
          from pathlib import Path

          text = Path('Cargo.toml').read_text(encoding='utf-8')
          in_workspace = False
          version = None
          for line in text.splitlines():
            if line.strip() == '[workspace.package]':
              in_workspace = True
              continue
            if in_workspace and line.strip().startswith('['):
              break
            if in_workspace:
              match = re.match(r'version\s*=\s*"([^"]+)"', line.strip())
              if match:
                version = match.group(1)
                break
          if not version:
            raise SystemExit('version not found in [workspace.package]')
          print(version)
          PY
          )
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Delete existing release assets
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = 'latest';
            const prefix = `LingStation-v${process.env.VERSION}-`;
            let release;
            try {
              const res = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              release = res.data;
            } catch (err) {
              core.info('No existing latest release; skipping asset delete.');
              return;
            }
            for (const asset of release.assets || []) {
              if (asset.name.startsWith(prefix)) {
                core.info(`Deleting asset ${asset.name}`);
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: asset.id,
                });
              }
            }

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          target_commitish: ${{ github.sha }}
          make_latest: true
          files: |
            dist/**/LingStation-v${{ env.VERSION }}-*.tar.gz
            dist/**/LingStation-v${{ env.VERSION }}-*.zip
